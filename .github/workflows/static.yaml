name: CI y Documentación

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Tests
        run: mvn test

      - name: Generar Javadoc
        run: |
          javadoc -d docs -sourcepath src -subpackages Dominio:LogicaNegocio:Persistencia:CapaAccesoDatos

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Desplegar en GitHub Pages
        uses: actions/deploy-pages@v4