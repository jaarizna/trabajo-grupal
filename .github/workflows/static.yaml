name: CI y Documentación

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Ejecutar Tests
        run: mvn test

      - name: Generar Javadoc con Maven
        run: |
          mvn javadoc:javadoc
          
          mkdir -p docs
          cp -r target/site/apidocs/* docs/

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Desplegar en GitHub Pages
        uses: actions/deploy-pages@v4